name: Build Docker Image Without Local Docker

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest   

    steps:
      - name: Get Code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.palashdevops }}
          password: ${{ secrets.Symantec@@2026 }}

      - name: Build Image
        run: docker build -t ${{ secrets.palashdevops }}/my-html-app .

      - name: Push Image
        run: docker push ${{ secrets.palashdevops }}/my-html-app
